version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: scheduler_user
      POSTGRES_PASSWORD: scheduler_password
      POSTGRES_DB: job_scheduler
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
